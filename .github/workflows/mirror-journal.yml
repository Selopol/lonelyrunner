name: mirror the journal

# The live journal lives on the worker's volume. This pulls it back into the
# repository every hour so the record survives the service, and so anyone can
# read the whole chain from git without trusting the site.
on:
  schedule:
    # every 20 minutes; GitHub queues these loosely, so the real gap varies
    - cron: "*/20 * * * *"
  # GitHub's scheduler is best-effort and drops ticks under load, so any
  # commit mirrors too. Neither path needs a credential.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch the live journal
        run: |
          set -euo pipefail
          curl -fsS --max-time 120 https://lonelyrunner.fun/journal/events.jsonl \
            -o /tmp/events.jsonl
          test -s /tmp/events.jsonl
          mv /tmp/events.jsonl journal/events.jsonl

      - name: Verify the hash chain before committing
        run: python3 tools/journal.py verify

      - name: Rebuild notebook entries from the journal
        run: python3 tools/memory.py restore

      # Only a push may be the mirror reacting to itself. Applying this to
      # scheduled runs deadlocked the mirror: once the head commit was its
      # own, every later run skipped and the repo froze 89 events behind.
      - name: Skip a push that this mirror itself made
        if: github.event_name == 'push'
        run: |
          if git log -1 --pretty=%s | grep -q '^mirror: journal at'; then
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Commit if the record moved
        if: env.SKIP != '1'
        run: |
          set -euo pipefail
          git config user.name "Lonely Runner Lab"
          git config user.email "lab@lonelyrunner.fun"
          git add journal/events.jsonl notebook
          if git diff --cached --quiet; then
            echo "journal unchanged"
            exit 0
          fi
          n=$(wc -l < journal/events.jsonl | tr -d ' ')
          git commit -m "mirror: journal at $n events"
          git push
